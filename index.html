<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan's Dine Free Offer!</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; color: white; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 85%; color: #333; }
        .card img { width: 100%; border-radius: 10px; }
        h2 { color: #d35400; margin: 10px 0; }
        .btn { background: #ff4757; color: white; padding: 15px; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        
        /* Hacked Screen */
        #hacker-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: #00ff00; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; text-align: center; font-family: 'Courier New', monospace; padding: 20px;
        }
        .glitch-text { font-size: 18px; margin: 5px 0; }
        
        /* Reveal Style */
        #reveal { display: none; font-size: 45px; font-weight: bold; color: #ff0000; animation: bounce 0.4s infinite alternate; }
        .credit { font-size: 22px; color: #fff; margin-top: 15px; font-weight: normal; }
        
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" alt="Pizza">
        <h2>Free Platter Giveaway! 🍕</h2>
        <p>You've been selected for a free platter! Click to get your unique QR code.</p>
        <button class="btn" onclick="startPrank()">CLAIM NOW</button>
    </div>

    <div id="hacker-screen">
        <div id="hacker-logs">
            <p class="glitch-text">ACCESSING SYSTEM FILES...</p>
            <p>Remote IP found: 103.23.44.11</p>
            <p>Downloading Google Photos... 88%</p>
            <p style="color: red;">ERROR: ENCRYPTION FAILED</p>
            <h3 id="timer">System Lock: 10s</h3>
        </div>

        <div id="reveal">
            APRIL FOOL! HAHA! 😂
            <div class="credit">Credit: Arib</div>
        </div>
    </div>

    <script>
        function startPrank() {
            // Fullscreen attempt
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            document.getElementById('main-card').style.display = 'none';
            document.getElementById('hacker-screen').style.display = 'flex';

            let seconds = 10; // 10 second timer
            const timerElement = document.getElementById('timer');
            const logs = document.getElementById('hacker-logs');
            const reveal = document.getElementById('reveal');

            // Block back button trick
            window.history.pushState(null, null, window.location.href);
            window.onpopstate = function() {
                window.history.go(1);
            };

            const countdown = setInterval(() => {
                seconds--;
                timerElement.innerText = "System Lock: " + seconds + "s";
                
                if (seconds <= 0) {
                    clearInterval(countdown);
                    logs.style.display = 'none';
                    reveal.style.display = 'block';
                }
            }, 1000);
        }
    </script>
</body>
</html>
